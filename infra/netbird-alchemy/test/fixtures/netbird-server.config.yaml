server:
  listenAddress: ":80"
  exposedAddress: "@exposedAddress@"
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"
  # Fixed test secrets — fine for ephemeral local fixtures.
  authSecret: "test-auth-secret-32chars-xxxxxx"
  dataDir: "/var/lib/netbird"
  disableAnonymousMetrics: true
  disableGeoliteUpdate: true
  auth:
    issuer: "@exposedAddress@/oauth2"
    localAuthDisabled: false
    signKeyRefreshEnabled: true
    sessionCookieEncryptionKey: "0123456789abcdef0123456789abcdef"
    dashboardRedirectURIs:
      - "@exposedAddress@/nb-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"
  store:
    engine: "sqlite"
    # base64(32 zero bytes) — AES store key for ephemeral SQLite state
    encryptionKey: "MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA="
